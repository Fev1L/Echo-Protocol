name: Build EchoProtocol + Installer

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # --------------------------------------
      # Windows: MSYS2 + Inno Setup
      # --------------------------------------
      - name: Setup MSYS2 & Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install innosetup -y
          ridk exec pacman -S --noconfirm make

      # --------------------------------------
      # Linux dependencies
      # --------------------------------------
      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libasound2-dev libpulse-dev libx11-dev libxext-dev \
            libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev \
            libxss-dev libxtst-dev libwayland-dev libxkbcommon-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
            libdbus-1-dev libibus-1.0-dev libudev-dev \
            libfreetype-dev libharfbuzz-dev libpng-dev libjpeg-dev libwebp-dev libtiff-dev libavif-dev

      # --------------------------------------
      # Configure & build
      # --------------------------------------
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 2

      # --------------------------------------
      # Windows: Create installer (.exe)
      # --------------------------------------
      - name: Create Windows Installer
        if: runner.os == 'Windows'
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_script.iss

      # --------------------------------------
      # macOS: Create .dmg
      # --------------------------------------
      - name: Create macOS DMG
        if: runner.os == 'macOS'
        run: |
          mkdir -p build/installer
          mkdir -p build/dmg_content
          
          cp -a build/EchoProtocol.app build/dmg_content/
          
          ln -s /Applications build/dmg_content/Applications
          
          hdiutil create -volname "EchoProtocol" \
            -srcfolder build/dmg_content \
            -ov -format UDZO \
            build/installer/EchoProtocol.dmg

      # --------------------------------------
      # Linux: Create tar.gz portable package
      # --------------------------------------
      - name: Package Linux binary
        if: runner.os == 'Linux'
        run: |
          mkdir -p build/installer/Linux/EchoProtocol
          cp build/EchoProtocol build/installer/Linux/EchoProtocol/
          cp -r assets build/installer/Linux/EchoProtocol/
          tar -czf build/installer/EchoProtocol-linux.tar.gz -C build/installer/Linux EchoProtocol

      # --------------------------------------
      # Upload artifacts
      # --------------------------------------
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EchoProtocol-${{ runner.os }}
          path: |
            build/Release/EchoProtocol.exe
            build/EchoProtocol.app
            build/installer/EchoProtocol-linux.tar.gz
            build/installer/EchoProtocol.dmg
            build/installer/*.exe
